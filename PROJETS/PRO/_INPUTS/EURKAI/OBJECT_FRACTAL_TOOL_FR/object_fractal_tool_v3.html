<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Fractal Tool — v2 Tags & Alias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #111113;
      --bg-tertiary: #1a1a1d;
      --bg-hover: #222226;
      --bg-selected: #2a2a30;
      
      --border-subtle: #2a2a2e;
      --border-medium: #3a3a40;
      --border-accent: #4a4a52;
      
      --text-primary: #e8e8eb;
      --text-secondary: #a0a0a8;
      --text-muted: #606068;
      
      --accent-owned: #22c55e;
      --accent-inherited: #3b82f6;
      --accent-injected: #a855f7;
      --accent-warning: #f59e0b;
      --accent-error: #ef4444;
      --accent-tag: #06b6d4;
      --accent-category: #ec4899;
      --accent-alias: #f97316;
      
      --glow-owned: rgba(34, 197, 94, 0.15);
      --glow-inherited: rgba(59, 130, 246, 0.15);
      --glow-injected: rgba(168, 85, 247, 0.15);
      --glow-tag: rgba(6, 182, 212, 0.15);
      --glow-category: rgba(236, 72, 153, 0.15);
      
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
      
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      
      --transition-fast: 120ms ease;
      --transition-medium: 200ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo::before {
      content: '◈';
      color: var(--accent-owned);
      font-size: 16px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .breadcrumb-item {
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .breadcrumb-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-medium);
    }

    .breadcrumb-item.active {
      background: var(--bg-selected);
      color: var(--accent-owned);
      border-color: var(--accent-owned);
    }

    .lineage-input-wrapper {
      position: relative;
      flex: 1;
      max-width: 500px;
    }

    .lineage-input {
      width: 100%;
      padding: 8px 14px 8px 36px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: all var(--transition-fast);
    }

    .lineage-input::placeholder { color: var(--text-muted); }

    .lineage-input:focus {
      border-color: var(--accent-owned);
      box-shadow: 0 0 0 3px var(--glow-owned);
    }

    .lineage-input.invalid {
      border-color: var(--accent-error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .lineage-input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .lineage-input-hint {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      padding: 2px 6px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
    }

    /* Main - 3 columns */
    .main {
      display: grid;
      grid-template-columns: 260px 1fr 240px;
      overflow: hidden;
    }

    /* Panel Common */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .panel-actions {
      display: flex;
      gap: 4px;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .panel-content::-webkit-scrollbar { width: 8px; }
    .panel-content::-webkit-scrollbar-track { background: transparent; }
    .panel-content::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 4px; }
    .panel-content::-webkit-scrollbar-thumb:hover { background: var(--border-medium); }

    /* Tree Panel */
    .tree-panel {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
    }

    .icon-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 14px;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-subtle);
      color: var(--text-primary);
    }

    /* Tree Node */
    .tree-node { user-select: none; }

    .tree-node-content {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
    }

    .tree-node-content:hover { background: var(--bg-hover); }
    .tree-node-content.selected { background: var(--bg-selected); border-color: var(--border-medium); }
    .tree-node-content.drag-over { 
      background: var(--glow-tag); 
      border-color: var(--accent-tag);
      box-shadow: 0 0 0 2px var(--accent-tag), inset 0 0 8px var(--glow-tag);
    }
    .tree-node-content.dragging { opacity: 0.5; }

    .tree-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      flex-shrink: 0;
      transition: transform var(--transition-fast);
    }

    .tree-toggle.expanded { transform: rotate(90deg); }
    .tree-toggle.empty { visibility: hidden; }

    .tree-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .tree-icon.root { color: var(--accent-owned); }
    .tree-icon.branch { color: var(--accent-inherited); }
    .tree-icon.leaf { color: var(--text-muted); }

    .tree-label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-node-content.to-finalize .tree-label {
      color: var(--accent-warning);
      font-style: italic;
    }

    .tree-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 5px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      color: var(--text-muted);
    }

    .tree-tags {
      display: flex;
      gap: 2px;
      margin-left: 4px;
    }

    .tree-tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-tag);
    }

    .tree-tag-dot.category { background: var(--accent-category); }

    .tree-children {
      margin-left: 16px;
      border-left: 1px solid var(--border-subtle);
      padding-left: 4px;
    }

    /* Tag button - always visible */
    .tree-tag-btn {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-left: 4px;
      flex-shrink: 0;
      opacity: 0.5;
      transition: all var(--transition-fast);
    }

    .tree-node-content:hover .tree-tag-btn { 
      opacity: 1;
      background: var(--accent-tag);
      border-color: var(--accent-tag);
      color: var(--bg-primary);
    }
    .tree-tag-btn:hover { transform: scale(1.1); background: var(--accent-category) !important; border-color: var(--accent-category) !important; }

    /* Tag Picker Popup */
    .tag-picker {
      position: fixed;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      padding: 8px;
      min-width: 160px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
    }

    .tag-picker.visible { display: block; }

    .tag-picker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }

    .tag-picker-item:hover { background: var(--bg-hover); }
    .tag-picker-item.assigned { color: var(--accent-tag); }
    .tag-picker-item::before { content: '○'; color: var(--text-muted); font-size: 10px; margin-right: 4px; }
    .tag-picker-item.assigned::before { content: '✓'; color: var(--accent-tag); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-lg);
      padding: 24px;
      min-width: 400px;
      max-width: 500px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .modal-body {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-body code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      color: var(--accent-owned);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .modal-btn.secondary { background: transparent; color: var(--text-secondary); }
    .modal-btn.secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
    .modal-btn.primary { background: var(--accent-owned); color: var(--bg-primary); border-color: var(--accent-owned); }

    /* Schema Editor */
    .element-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .add-element-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 8px;
      background: var(--bg-tertiary);
      border: 1px dashed var(--border-medium);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .add-element-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent-owned);
      color: var(--accent-owned);
    }

    .element-form {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
    }

    .element-form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .element-form-row:last-child {
      margin-bottom: 0;
    }

    .element-form-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      width: 60px;
      flex-shrink: 0;
    }

    .element-form-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
    }

    .element-form-input:focus {
      border-color: var(--accent-owned);
    }

    .element-form-input.small {
      width: 80px;
      flex: none;
    }

    .element-form-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-owned);
    }

    .element-form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .element-form-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .element-form-btn.cancel {
      background: transparent;
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
    }

    .element-form-btn.cancel:hover {
      background: var(--bg-hover);
    }

    .element-form-btn.save {
      background: var(--accent-owned);
      border: 1px solid var(--accent-owned);
      color: var(--bg-primary);
    }

    .element-form-btn.save:hover {
      opacity: 0.9;
    }

    /* Editable element tag */
    .element-tag.editable {
      cursor: pointer;
      position: relative;
    }

    .element-tag.editable:hover {
      filter: brightness(1.2);
    }

    .element-tag .edit-icon {
      font-size: 9px;
      margin-left: 4px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .element-tag:hover .edit-icon {
      opacity: 0.7;
    }

    .element-tag .delete-btn {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0;
      cursor: pointer;
      color: var(--accent-error);
      transition: opacity var(--transition-fast);
    }

    .element-tag:hover .delete-btn {
      opacity: 0.7;
    }

    .element-tag .delete-btn:hover {
      opacity: 1;
    }

    /* Instantiate button */
    .instantiate-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 8px 16px;
      background: var(--accent-injected);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      cursor: pointer;
      margin-top: 12px;
      transition: all var(--transition-fast);
    }

    .instantiate-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* Catalog section */
    .catalog-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px dashed var(--border-subtle);
    }

    .catalog-item {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .catalog-item-info {
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .catalog-item-id {
      color: var(--accent-injected);
    }

    .catalog-item-date {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 12px;
    }

    .catalog-item-delete {
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }

    .catalog-item-delete:hover {
      color: var(--accent-error);
    }

    /* Fractal Panel */
    .fractal-panel { background: var(--bg-primary); }

    .fractal-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .fractal-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fractal-title::before {
      content: '⬡';
      color: var(--accent-inherited);
    }

    .depth-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .depth-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .depth-slider {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border-subtle);
      border-radius: 2px;
      outline: none;
    }

    .depth-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent-inherited);
      border-radius: 50%;
      cursor: pointer;
    }

    .depth-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-inherited);
      min-width: 20px;
      text-align: center;
    }

    .fractal-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state-text {
      font-family: var(--font-mono);
      font-size: 13px;
      max-width: 300px;
    }

    /* Lineage Chain */
    .lineage-chain {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lineage-step {
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    .lineage-connector {
      width: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .lineage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-inherited);
      border: 2px solid var(--bg-primary);
      z-index: 1;
      flex-shrink: 0;
      margin-top: 10px;
    }

    .lineage-step.current .lineage-dot {
      background: var(--accent-owned);
      width: 14px;
      height: 14px;
      margin-top: 8px;
    }

    .lineage-step.to-finalize .lineage-dot { background: var(--accent-warning); }

    .lineage-line {
      flex: 1;
      width: 2px;
      background: var(--border-subtle);
      margin-top: 4px;
    }

    .lineage-step:last-child .lineage-line { display: none; }

    .lineage-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: all var(--transition-fast);
    }

    .lineage-card.drag-over {
      border-color: var(--accent-tag);
      box-shadow: 0 0 0 2px var(--accent-tag), inset 0 0 12px var(--glow-tag);
      background: rgba(6, 182, 212, 0.05);
    }

    .lineage-step.current .lineage-card {
      border-color: var(--accent-owned);
      box-shadow: 0 0 0 3px var(--glow-owned);
    }

    .lineage-step.to-finalize .lineage-card {
      border-color: var(--accent-warning);
      background: rgba(245, 158, 11, 0.05);
    }

    .lineage-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .lineage-card-name {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .lineage-card-lineage {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }

    .lineage-card-elements {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .element-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .element-group-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      width: 60px;
      flex-shrink: 0;
    }

    .element-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .element-tag.owned {
      background: var(--glow-owned);
      color: var(--accent-owned);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .element-tag.inherited {
      background: var(--glow-inherited);
      color: var(--accent-inherited);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .element-tag.injected {
      background: var(--glow-injected);
      color: var(--accent-injected);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    .element-tag-source {
      font-size: 9px;
      opacity: 0.7;
    }

    /* Tags & Alias Section in Fractal */
    .section-divider {
      margin: 16px 0;
      border-top: 1px dashed var(--border-subtle);
      padding-top: 16px;
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 12px;
      background: var(--accent-tag);
      border-radius: 2px;
    }

    .section-title.alias::before { background: var(--accent-alias); }

    .tags-display {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--glow-tag);
      color: var(--accent-tag);
      border: 1px solid rgba(6, 182, 212, 0.3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-pill.category {
      background: var(--glow-category);
      color: var(--accent-category);
      border-color: rgba(236, 72, 153, 0.3);
    }

    .tag-pill .remove-tag {
      cursor: pointer;
      opacity: 0.6;
      transition: opacity var(--transition-fast);
    }

    .tag-pill .remove-tag:hover { opacity: 1; }

    .alias-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .alias-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
    }

    .alias-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-alias);
    }

    .alias-arrow {
      color: var(--text-muted);
      font-size: 10px;
    }

    .alias-target {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .alias-remove {
      margin-left: auto;
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .alias-remove:hover { color: var(--accent-error); }

    .add-alias-form {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .add-alias-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
    }

    .add-alias-input:focus {
      border-color: var(--accent-alias);
    }

    .add-alias-btn {
      padding: 6px 12px;
      background: var(--accent-alias);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--bg-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition-fast);
    }

    .add-alias-btn:hover { opacity: 0.9; }

    /* Tags Panel (Right Sidebar) */
    .tags-panel {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
    }

    .tag-create-form {
      padding: 8px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      gap: 6px;
    }

    .tag-create-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
    }

    .tag-create-input:focus { border-color: var(--accent-tag); }

    .tag-create-btn {
      padding: 6px 10px;
      background: var(--accent-tag);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--bg-primary);
      font-size: 12px;
      cursor: pointer;
    }

    .tags-list {
      padding: 8px;
    }

    .sidebar-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 4px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: grab;
      transition: all var(--transition-fast);
    }

    .sidebar-tag::before {
      content: '⠿';
      color: var(--text-muted);
      font-size: 10px;
      opacity: 0.5;
    }

    .sidebar-tag:hover {
      background: var(--bg-hover);
      border-color: var(--border-medium);
    }

    .sidebar-tag:hover::before {
      opacity: 1;
    }

    .sidebar-tag:active {
      cursor: grabbing;
    }

    .sidebar-tag.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .sidebar-tag.category {
      border-left: 3px solid var(--accent-category);
    }

    .sidebar-tag-icon {
      font-size: 10px;
      color: var(--accent-tag);
    }

    .sidebar-tag.category .sidebar-tag-icon { color: var(--accent-category); }

    .sidebar-tag-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      flex: 1;
    }

    .sidebar-tag-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 1px 6px;
      border-radius: 8px;
    }

    .sidebar-tag-parent {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--accent-category);
      margin-left: 18px;
      margin-top: -2px;
      margin-bottom: 4px;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      padding: 4px;
      min-width: 180px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
    }

    .context-menu.visible { display: block; }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
    }

    .context-menu-item:hover { background: var(--bg-hover); }

    .context-menu-item.checked::before {
      content: '✓';
      color: var(--accent-owned);
    }

    .context-menu-item.unchecked::before {
      content: '○';
      color: var(--text-muted);
    }

    .context-menu-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 4px 0;
    }

    .context-menu-label {
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .context-menu-item.sub {
      padding-left: 24px;
      font-size: 11px;
    }

    .context-menu-item.sub.selected {
      color: var(--accent-category);
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-dot.owned { background: var(--accent-owned); }
    .legend-dot.inherited { background: var(--accent-inherited); }
    .legend-dot.injected { background: var(--accent-injected); }
    .legend-dot.tag { background: var(--accent-tag); }
    .legend-dot.category { background: var(--accent-category); }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 260px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    .toast {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.success { border-color: var(--accent-owned); }
    .toast.error { border-color: var(--accent-error); }
    .toast.warning { border-color: var(--accent-warning); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">Object Fractal Tool</div>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="lineage-input-wrapper">
        <span class="lineage-input-icon">⌘</span>
        <input type="text" class="lineage-input" id="lineageInput" placeholder="Saisir un lineage... (ex: Entity:Agent:AIAgent)" spellcheck="false" autocomplete="off">
        <span class="lineage-input-hint">Enter ↵</span>
      </div>
    </header>

    <main class="main">
      <!-- Tree Panel -->
      <aside class="panel tree-panel">
        <div class="panel-header">
          <span class="panel-title">ObjectTypes</span>
          <div class="panel-actions">
            <button class="icon-btn" title="Tout replier" onclick="collapseAll()">−</button>
            <button class="icon-btn" title="Tout déplier" onclick="expandAll()">+</button>
          </div>
        </div>
        <div class="panel-content" id="treeContainer"></div>
      </aside>

      <!-- Fractal Panel -->
      <section class="panel fractal-panel">
        <div class="fractal-header">
          <div class="fractal-title" id="fractalTitle">Sélectionner un ObjectType</div>
          <div class="depth-control">
            <span class="depth-label">Profondeur</span>
            <input type="range" class="depth-slider" id="depthSlider" min="1" max="10" value="5">
            <span class="depth-value" id="depthValue">5</span>
          </div>
        </div>
        <div class="fractal-content" id="fractalContent">
          <div class="empty-state">
            <div class="empty-state-icon">◇</div>
            <div class="empty-state-text">Sélectionnez un ObjectType dans l'arbre pour voir sa vue fractale.</div>
          </div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot owned"></span>owned</div>
          <div class="legend-item"><span class="legend-dot inherited"></span>inherited</div>
          <div class="legend-item"><span class="legend-dot injected"></span>injected</div>
          <div class="legend-item"><span class="legend-dot tag"></span>tag</div>
          <div class="legend-item"><span class="legend-dot category"></span>category</div>
        </div>
      </section>

      <!-- Tags Panel -->
      <aside class="panel tags-panel">
        <div class="panel-header">
          <span class="panel-title">Tags</span>
        </div>
        <div class="tag-create-form">
          <input type="text" class="tag-create-input" id="tagCreateInput" placeholder="Nouveau tag...">
          <button class="tag-create-btn" onclick="createTag()">+</button>
        </div>
        <div class="panel-content tags-list" id="tagsContainer"></div>
      </aside>
    </main>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" id="toggleCategory">Catégorie</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-label">Parent Category</div>
    <div id="parentCategoryList"></div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" style="color: var(--accent-error);" id="deleteTag">Supprimer</div>
  </div>

  <!-- Tag Picker Popup -->
  <div class="tag-picker" id="tagPicker">
    <div id="tagPickerList"></div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Confirmation</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="modalCancel">Annuler</button>
        <button class="modal-btn primary" id="modalConfirm">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // =============================================================================
    // CONFIGURATION
    // =============================================================================
    
    const LINEAGE_REGEX = /^([A-Z][A-Za-z0-9]*)(:[A-Z][A-Za-z0-9]*)*$/;

    // =============================================================================
    // DATA STORE
    // =============================================================================
    
    let store = {
      objectTypes: {},
      tags: {},
      aliases: {},
      catalog: { examples: [] },
      lineageIndex: { index: {}, roots: [] },
      selectedLineage: null,
      expandedNodes: new Set(),
      maxDepth: 5,
      editingElement: null
    };

    // Initial Data
    const INITIAL_DATA = {
      objectTypes: {
        'uuid-core': {
          id: 'uuid-core', lineage: 'Core', name: 'Core', parent: null, toFinalize: false, tags: [],
          elementList: {
            AttributeList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'version', type: 'string', source: 'owned' }, { name: 'priority', type: 'string', source: 'owned', default: 'natural' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'initialize', signature: 'initialize(): void', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        },
        'uuid-entity': {
          id: 'uuid-entity', lineage: 'Entity', name: 'Entity', parent: null, toFinalize: false, tags: ['core'],
          elementList: {
            AttributeList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'id', type: 'uuid', source: 'owned' }, { name: 'name', type: 'string', source: 'owned' }, { name: 'createdAt', type: 'datetime', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'create', signature: 'create(data): Entity', source: 'owned' }, { name: 'update', signature: 'update(data): Entity', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        },
        'uuid-agent': {
          id: 'uuid-agent', lineage: 'Entity:Agent', name: 'Agent', parent: 'Entity', toFinalize: false, tags: ['ai', 'core'],
          elementList: {
            AttributeList: { inherited_bundle: [{ name: 'id', type: 'uuid', source: 'inherited', from: 'Entity' }, { name: 'name', type: 'string', source: 'inherited', from: 'Entity' }], injected_bundle: [], owned_bundle: [{ name: 'status', type: 'enum', source: 'owned' }, { name: 'capabilities', type: 'array', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [{ name: 'create', signature: 'create(data): Entity', source: 'inherited', from: 'Entity' }], injected_bundle: [], owned_bundle: [{ name: 'execute', signature: 'execute(task): Result', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        },
        'uuid-ai-agent': {
          id: 'uuid-ai-agent', lineage: 'Entity:Agent:AIAgent', name: 'AIAgent', parent: 'Entity:Agent', toFinalize: false, tags: ['ai', 'llm'],
          elementList: {
            AttributeList: { inherited_bundle: [{ name: 'id', type: 'uuid', source: 'inherited', from: 'Entity' }, { name: 'status', type: 'enum', source: 'inherited', from: 'Entity:Agent' }], injected_bundle: [{ name: 'logLevel', type: 'string', source: 'injected', from: 'Provider:Logging' }], owned_bundle: [{ name: 'model', type: 'string', source: 'owned' }, { name: 'temperature', type: 'float', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ type: 'depends_on', target: 'Core:Config', source: 'owned' }] },
            MethodList: { inherited_bundle: [{ name: 'execute', signature: 'execute(task): Result', source: 'inherited', from: 'Entity:Agent' }], injected_bundle: [], owned_bundle: [{ name: 'prompt', signature: 'prompt(input): Response', source: 'owned' }, { name: 'stream', signature: 'stream(input): AsyncIterator', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ id: 'rule-001', type: 'ERK', condition: 'this.model != null', action: 'enable', target: 'this.prompt', source: 'owned' }] }
          }
        },
        'uuid-human-agent': {
          id: 'uuid-human-agent', lineage: 'Entity:Agent:HumanAgent', name: 'HumanAgent', parent: 'Entity:Agent', toFinalize: false, tags: ['human'],
          elementList: {
            AttributeList: { inherited_bundle: [{ name: 'id', type: 'uuid', source: 'inherited', from: 'Entity' }], injected_bundle: [], owned_bundle: [{ name: 'email', type: 'string', source: 'owned' }, { name: 'role', type: 'string', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'assign', signature: 'assign(task): void', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        },
        'uuid-resource': {
          id: 'uuid-resource', lineage: 'Entity:Resource', name: 'Resource', parent: 'Entity', toFinalize: false, tags: ['storage'],
          elementList: {
            AttributeList: { inherited_bundle: [{ name: 'id', type: 'uuid', source: 'inherited', from: 'Entity' }], injected_bundle: [], owned_bundle: [{ name: 'url', type: 'string', source: 'owned' }, { name: 'mimeType', type: 'string', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'fetch', signature: 'fetch(): Buffer', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        },
        'uuid-schema': {
          id: 'uuid-schema', lineage: 'Schema', name: 'Schema', parent: null, toFinalize: false, tags: ['meta'],
          elementList: {
            AttributeList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'appliesTo', type: 'pattern', source: 'owned' }, { name: 'constraints', type: 'object', source: 'owned' }] },
            RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
            MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [{ name: 'validate', signature: 'validate(object): boolean', source: 'owned' }] },
            RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
          }
        }
      },
      tags: {
        'core': { id: 'core', name: 'core', isCategory: true, parentCategory: null, color: '#22c55e' },
        'ai': { id: 'ai', name: 'ai', isCategory: true, parentCategory: 'core', color: '#3b82f6' },
        'llm': { id: 'llm', name: 'llm', isCategory: false, parentCategory: 'ai', color: '#a855f7' },
        'human': { id: 'human', name: 'human', isCategory: false, parentCategory: null, color: '#f59e0b' },
        'storage': { id: 'storage', name: 'storage', isCategory: false, parentCategory: 'core', color: '#06b6d4' },
        'meta': { id: 'meta', name: 'meta', isCategory: true, parentCategory: null, color: '#ec4899' }
      },
      aliases: {}
    };

    // =============================================================================
    // LINEAGE UTILITIES
    // =============================================================================
    
    function validateLineage(lineage) { return LINEAGE_REGEX.test(lineage); }

    function parseLineage(lineage) {
      if (!validateLineage(lineage)) return null;
      return lineage.split(':');
    }

    function getParentLineage(lineage) {
      const segments = parseLineage(lineage);
      if (!segments || segments.length <= 1) return null;
      return segments.slice(0, -1).join(':');
    }

    function getNameFromLineage(lineage) {
      const segments = parseLineage(lineage);
      if (!segments) return null;
      return segments[segments.length - 1];
    }

    function buildLineageIndex() {
      const index = {};
      const roots = [];
      Object.values(store.objectTypes).forEach(obj => {
        const segments = parseLineage(obj.lineage);
        index[obj.lineage] = { id: obj.id, parent: obj.parent, children: [], depth: segments ? segments.length : 0, toFinalize: obj.toFinalize || false };
        if (!obj.parent) roots.push(obj.lineage);
      });
      Object.values(store.objectTypes).forEach(obj => {
        if (obj.parent && index[obj.parent]) index[obj.parent].children.push(obj.lineage);
      });
      Object.values(index).forEach(entry => entry.children.sort((a, b) => a.localeCompare(b)));
      roots.sort((a, b) => a.localeCompare(b));
      store.lineageIndex = { index, roots };
    }

    function getAncestors(lineage) {
      const ancestors = [];
      const segments = parseLineage(lineage);
      if (!segments) return ancestors;
      for (let i = 1; i < segments.length; i++) ancestors.push(segments.slice(0, i).join(':'));
      return ancestors;
    }

    function getDescendants(lineage) {
      const descendants = [];
      function collect(lin) {
        const e = store.lineageIndex.index[lin];
        if (e && e.children) e.children.forEach(c => { descendants.push(c); collect(c); });
      }
      collect(lineage);
      return descendants;
    }

    function getObjectTypeByLineage(lineage) {
      return Object.values(store.objectTypes).find(o => o.lineage === lineage);
    }

    /**
     * Find ObjectType(s) by name (last segment only)
     */
    function findObjectTypesByName(name) {
      return Object.values(store.objectTypes).filter(o => o.name === name);
    }

    // =============================================================================
    // MODAL SYSTEM
    // =============================================================================

    let modalCallback = null;

    function showModal(title, bodyHtml) {
      return new Promise((resolve) => {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('modalOverlay').classList.add('visible');
        modalCallback = resolve;
      });
    }

    function hideModal() {
      document.getElementById('modalOverlay').classList.remove('visible');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('modalConfirm').addEventListener('click', () => { hideModal(); if (modalCallback) modalCallback(true); });
      document.getElementById('modalCancel').addEventListener('click', () => { hideModal(); if (modalCallback) modalCallback(false); });
      document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') { hideModal(); if (modalCallback) modalCallback(false); } });
    });

    // =============================================================================
    // OBJECT TYPE MANAGEMENT
    // =============================================================================
    
    function createObjectType(lineage, toFinalize = false) {
      return createObjectTypeDirect(lineage, toFinalize);
    }

    /**
     * Smart lineage creation - searches by name and asks for confirmation
     */
    async function createLineageWithAncestors(typedLineage) {
      if (!validateLineage(typedLineage)) { showToast('Lineage invalide', 'error'); return null; }
      
      // Check exact match first
      const exactMatch = getObjectTypeByLineage(typedLineage);
      if (exactMatch) {
        selectNode(typedLineage);
        showToast('ObjectType sélectionné', 'success');
        return [exactMatch];
      }

      const segments = parseLineage(typedLineage);
      let currentPath = [];
      const created = [];

      for (let i = 0; i < segments.length; i++) {
        const segmentName = segments[i];
        const expectedLineage = currentPath.length > 0 ? currentPath.join(':') + ':' + segmentName : segmentName;
        
        // Check if exact lineage exists at this path
        const exactAtPath = getObjectTypeByLineage(expectedLineage);
        if (exactAtPath) {
          currentPath.push(segmentName);
          continue;
        }

        // Search by name
        const nameMatches = findObjectTypesByName(segmentName);
        
        if (nameMatches.length === 0) {
          // No match - create new
          currentPath.push(segmentName);
          const newLineage = currentPath.join(':');
          const obj = createObjectType(newLineage, true);
          if (obj) created.push(obj);
        } else if (nameMatches.length === 1) {
          // Single match - ask confirmation
          const match = nameMatches[0];
          const typedPartial = segments.slice(0, i + 1).join(':');
          const confirmed = await showModal(
            'Rattacher à un objet existant ?',
            `Vous avez saisi <code>${typedPartial}</code><br><br>Un objet <code>${segmentName}</code> existe déjà :<br><code>${match.lineage}</code><br><br>Rattacher à cet objet existant ?`
          );
          if (!confirmed) {
            showToast('Annulé', 'warning');
            return null;
          }
          currentPath = match.lineage.split(':');
        } else {
          // Multiple matches - show first and ask
          const match = nameMatches[0];
          const options = nameMatches.map(m => `<code>${m.lineage}</code>`).join(', ');
          const confirmed = await showModal(
            'Plusieurs correspondances',
            `L'objet <code>${segmentName}</code> existe à plusieurs endroits : ${options}<br><br>Utiliser <code>${match.lineage}</code> ?`
          );
          if (!confirmed) {
            showToast('Annulé', 'warning');
            return null;
          }
          currentPath = match.lineage.split(':');
        }
      }

      buildLineageIndex();
      return created;
    }

    function createObjectTypeDirect(lineage, toFinalize = false) {
      if (!validateLineage(lineage)) return null;
      if (getObjectTypeByLineage(lineage)) return getObjectTypeByLineage(lineage);
      const id = 'uuid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      const newObj = {
        id, lineage, name: getNameFromLineage(lineage), parent: getParentLineage(lineage), toFinalize, tags: [],
        elementList: {
          AttributeList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
          RelationList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
          MethodList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] },
          RuleList: { inherited_bundle: [], injected_bundle: [], owned_bundle: [] }
        }
      };
      store.objectTypes[id] = newObj;
      return newObj;
    }

    function reparentObjectType(lineage, newParentLineage) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return false;
      if (newParentLineage && !getObjectTypeByLineage(newParentLineage)) { showToast('Parent introuvable', 'error'); return false; }
      if (newParentLineage && (newParentLineage === lineage || newParentLineage.startsWith(lineage + ':'))) { showToast('Référence circulaire', 'error'); return false; }
      const oldLineage = obj.lineage;
      const newLineage = newParentLineage ? `${newParentLineage}:${obj.name}` : obj.name;
      if (!validateLineage(newLineage)) { showToast('Nouveau lineage invalide', 'error'); return false; }
      if (newLineage !== oldLineage && getObjectTypeByLineage(newLineage)) { showToast('Lineage existe déjà', 'error'); return false; }
      const descendants = getDescendants(oldLineage);
      obj.lineage = newLineage;
      obj.parent = newParentLineage;
      descendants.forEach(d => {
        const dObj = getObjectTypeByLineage(d);
        if (dObj) {
          dObj.lineage = d.replace(oldLineage, newLineage);
          dObj.parent = dObj.lineage.includes(':') ? dObj.lineage.split(':').slice(0, -1).join(':') : null;
        }
      });
      // Update aliases
      Object.values(store.aliases).forEach(alias => {
        if (alias.target === oldLineage) alias.target = newLineage;
        else if (alias.target.startsWith(oldLineage + ':')) alias.target = alias.target.replace(oldLineage, newLineage);
      });
      buildLineageIndex();
      showToast(`Déplacé: ${oldLineage} → ${newLineage}`, 'success');
      return true;
    }

    // =============================================================================
    // ELEMENT MANAGEMENT (Attributes, Methods, Rules, Relations)
    // =============================================================================

    /**
     * Add an element to an ObjectType's owned_bundle
     */
    function addElement(lineage, listType, element) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return false;
      
      const list = obj.elementList[listType];
      if (!list) return false;
      
      // Check for duplicates
      const exists = list.owned_bundle.find(e => e.name === element.name);
      if (exists) {
        showToast(`Élément "${element.name}" existe déjà`, 'warning');
        return false;
      }
      
      element.source = 'owned';
      list.owned_bundle.push(element);
      showToast(`${listType.replace('List', '')} ajouté: ${element.name}`, 'success');
      return true;
    }

    /**
     * Update an element in an ObjectType's owned_bundle
     */
    function updateElement(lineage, listType, oldName, newElement) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return false;
      
      const list = obj.elementList[listType];
      if (!list) return false;
      
      const index = list.owned_bundle.findIndex(e => e.name === oldName);
      if (index === -1) return false;
      
      newElement.source = 'owned';
      list.owned_bundle[index] = newElement;
      showToast(`${listType.replace('List', '')} modifié: ${newElement.name}`, 'success');
      return true;
    }

    /**
     * Delete an element from an ObjectType's owned_bundle
     */
    function deleteElement(lineage, listType, elementName) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return false;
      
      const list = obj.elementList[listType];
      if (!list) return false;
      
      const index = list.owned_bundle.findIndex(e => e.name === elementName);
      if (index === -1) return false;
      
      list.owned_bundle.splice(index, 1);
      showToast(`${listType.replace('List', '')} supprimé: ${elementName}`, 'success');
      return true;
    }

    /**
     * Add a relation to an ObjectType
     */
    function addRelation(lineage, relationType, targetLineage) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return false;
      
      const validTypes = ['inherits_from', 'depends_on', 'related_to'];
      if (!validTypes.includes(relationType)) {
        showToast('Type de relation invalide', 'error');
        return false;
      }
      
      obj.elementList.RelationList.owned_bundle.push({
        type: relationType,
        target: targetLineage,
        source: 'owned'
      });
      showToast(`Relation ajoutée: ${relationType} → ${targetLineage}`, 'success');
      return true;
    }

    // =============================================================================
    // CATALOG MANAGEMENT
    // =============================================================================

    /**
     * Create an instance example for the catalog
     */
    function createCatalogInstance(lineage) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return null;
      
      const instanceId = 'inst-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
      
      // Build instance with default values from schema
      const instance = {
        id: instanceId,
        objectType: lineage,
        createdAt: new Date().toISOString(),
        values: {}
      };
      
      // Collect all attributes (owned + inherited) and create default values
      const allAttrs = [
        ...obj.elementList.AttributeList.inherited_bundle,
        ...obj.elementList.AttributeList.owned_bundle
      ];
      
      allAttrs.forEach(attr => {
        instance.values[attr.name] = attr.default || getDefaultForType(attr.type);
      });
      
      store.catalog.examples.push(instance);
      showToast(`Instance créée: ${instanceId}`, 'success');
      renderFractal();
      return instance;
    }

    /**
     * Delete a catalog instance
     */
    function deleteCatalogInstance(instanceId) {
      const index = store.catalog.examples.findIndex(e => e.id === instanceId);
      if (index === -1) return false;
      store.catalog.examples.splice(index, 1);
      showToast(`Instance supprimée: ${instanceId}`, 'success');
      renderFractal();
      return true;
    }

    /**
     * Get default value for a type
     */
    function getDefaultForType(type) {
      const defaults = {
        'string': '',
        'number': 0,
        'float': 0.0,
        'boolean': false,
        'array': [],
        'object': {},
        'uuid': null,
        'datetime': null,
        'enum': null
      };
      return defaults[type] !== undefined ? defaults[type] : null;
    }

    /**
     * Get catalog instances for a lineage
     */
    function getCatalogInstances(lineage) {
      return store.catalog.examples.filter(e => e.objectType === lineage);
    }

    // =============================================================================
    // TAG MANAGEMENT
    // =============================================================================
    
    function createTag(name) {
      name = name || document.getElementById('tagCreateInput').value.trim().toLowerCase();
      if (!name) return;
      if (store.tags[name]) { showToast('Tag existe déjà', 'warning'); return; }
      store.tags[name] = { id: name, name, isCategory: false, parentCategory: null, color: getRandomColor() };
      document.getElementById('tagCreateInput').value = '';
      renderTags();
      showToast(`Tag créé: ${name}`, 'success');
    }

    function deleteTag(name) {
      if (!store.tags[name]) return;
      // Remove from all objectTypes
      Object.values(store.objectTypes).forEach(obj => {
        obj.tags = obj.tags.filter(t => t !== name);
      });
      // Remove parentCategory references
      Object.values(store.tags).forEach(t => {
        if (t.parentCategory === name) t.parentCategory = null;
      });
      delete store.tags[name];
      renderTags();
      renderTree();
      renderFractal();
      showToast(`Tag supprimé: ${name}`, 'success');
    }

    function toggleTagCategory(name) {
      if (!store.tags[name]) return;
      store.tags[name].isCategory = !store.tags[name].isCategory;
      if (!store.tags[name].isCategory) store.tags[name].parentCategory = null;
      renderTags();
    }

    function setTagParentCategory(tagName, parentName) {
      if (!store.tags[tagName]) return;
      if (parentName === tagName) return;
      // Prevent circular
      if (parentName && store.tags[parentName]) {
        let p = store.tags[parentName].parentCategory;
        while (p) {
          if (p === tagName) { showToast('Référence circulaire', 'error'); return; }
          p = store.tags[p]?.parentCategory;
        }
      }
      store.tags[tagName].parentCategory = parentName;
      renderTags();
    }

    function addTagToObjectType(lineage, tagName) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      if (!store.tags[tagName]) return;
      if (!obj.tags.includes(tagName)) {
        obj.tags.push(tagName);
        renderTree();
        renderFractal();
        showToast(`Tag ajouté: ${tagName} → ${obj.name}`, 'success');
      }
    }

    function removeTagFromObjectType(lineage, tagName) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      obj.tags = obj.tags.filter(t => t !== tagName);
      renderTree();
      renderFractal();
    }

    function getTagUsageCount(tagName) {
      return Object.values(store.objectTypes).filter(o => o.tags.includes(tagName)).length;
    }

    function toggleTagOnObjectType(lineage, tagName) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj || !store.tags[tagName]) return;
      if (obj.tags.includes(tagName)) {
        obj.tags = obj.tags.filter(t => t !== tagName);
      } else {
        obj.tags.push(tagName);
      }
      renderTree();
      renderFractal();
      renderTagPicker(lineage);
    }

    // =============================================================================
    // TAG PICKER
    // =============================================================================

    let tagPickerTarget = null;

    function showTagPicker(e, lineage) {
      e.stopPropagation();
      tagPickerTarget = lineage;
      const picker = document.getElementById('tagPicker');
      renderTagPicker(lineage);
      const rect = e.target.getBoundingClientRect();
      picker.style.left = (rect.right + 8) + 'px';
      picker.style.top = rect.top + 'px';
      picker.classList.add('visible');
    }

    function renderTagPicker(lineage) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      const list = document.getElementById('tagPickerList');
      const sorted = Object.values(store.tags).sort((a, b) => a.name.localeCompare(b.name));
      list.innerHTML = sorted.map(tag => {
        const assigned = obj.tags.includes(tag.name);
        return `<div class="tag-picker-item ${assigned ? 'assigned' : ''}" onclick="toggleTagOnObjectType('${lineage}', '${tag.name}')">${tag.name}</div>`;
      }).join('');
