    function hideTagPicker() {
      document.getElementById('tagPicker').classList.remove('visible');
      tagPickerTarget = null;
    }

    function getRandomColor() {
      const colors = ['#22c55e', '#3b82f6', '#a855f7', '#f59e0b', '#06b6d4', '#ec4899', '#ef4444', '#84cc16'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // =============================================================================
    // ALIAS MANAGEMENT
    // =============================================================================
    
    function createAlias(name, target, state = null) {
      name = name.trim().toLowerCase().replace(/\s+/g, '-');
      if (!name) return;
      if (store.aliases[name]) { showToast('Alias existe déjà', 'warning'); return; }
      if (!getObjectTypeByLineage(target)) { showToast('Target invalide', 'error'); return; }
      store.aliases[name] = { id: name, name, target, state };
      renderFractal();
      showToast(`Alias créé: ${name}`, 'success');
    }

    function deleteAlias(name) {
      if (!store.aliases[name]) return;
      delete store.aliases[name];
      renderFractal();
      showToast(`Alias supprimé: ${name}`, 'success');
    }

    function getAliasesForLineage(lineage) {
      return Object.values(store.aliases).filter(a => a.target === lineage);
    }

    // =============================================================================
    // XFRACTAL
    // =============================================================================
    
    function computeXFractal(lineage, maxDepth = 5) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return null;
      const ancestors = getAncestors(lineage);
      const chain = [...ancestors, lineage].slice(-(maxDepth));
      return {
        lineage,
        chain: chain.map(lin => {
          const o = getObjectTypeByLineage(lin);
          if (!o) return null;
          const isCurrent = lin === lineage;
          return {
            lineage: lin, name: o.name, isCurrent, toFinalize: o.toFinalize, tags: o.tags || [],
            elements: {
              attributes: collectElements(o.elementList.AttributeList, isCurrent),
              methods: collectElements(o.elementList.MethodList, isCurrent),
              relations: o.elementList.RelationList.owned_bundle,
              rules: o.elementList.RuleList.owned_bundle
            }
          };
        }).filter(Boolean),
        depthLimited: ancestors.length + 1 > maxDepth
      };
    }

    function collectElements(elementList, showAll = false) {
      const elements = [];
      if (showAll) {
        elementList.owned_bundle.forEach(e => elements.push({ ...e, source: 'owned' }));
        elementList.injected_bundle.forEach(e => elements.push({ ...e, source: 'injected' }));
        elementList.inherited_bundle.forEach(e => elements.push({ ...e, source: 'inherited' }));
      } else {
        elementList.owned_bundle.forEach(e => elements.push({ ...e, source: 'owned' }));
      }
      return elements;
    }

    // =============================================================================
    // TREE RENDERING
    // =============================================================================
    
    function renderTree() {
      const container = document.getElementById('treeContainer');
      container.innerHTML = '';
      store.lineageIndex.roots.forEach(root => {
        const node = renderTreeNode(root);
        if (node) container.appendChild(node);
      });
    }

    function renderTreeNode(lineage) {
      const entry = store.lineageIndex.index[lineage];
      const obj = getObjectTypeByLineage(lineage);
      if (!entry || !obj) return null;

      const node = document.createElement('div');
      node.className = 'tree-node';
      node.dataset.lineage = lineage;

      const hasChildren = entry.children.length > 0;
      const isExpanded = store.expandedNodes.has(lineage);
      const isSelected = store.selectedLineage === lineage;
      const isRoot = !obj.parent;

      const content = document.createElement('div');
      content.className = 'tree-node-content' + (isSelected ? ' selected' : '') + (obj.toFinalize ? ' to-finalize' : '');
      content.draggable = true;
      content.addEventListener('dragstart', e => handleDragStart(e, lineage, 'node'));
      content.addEventListener('dragend', handleDragEnd);
      content.addEventListener('dragover', e => handleDragOver(e, content));
      content.addEventListener('dragleave', e => handleDragLeave(e, content));
      content.addEventListener('drop', e => handleDrop(e, lineage, content));

      const toggle = document.createElement('span');
      toggle.className = 'tree-toggle' + (isExpanded ? ' expanded' : '') + (!hasChildren ? ' empty' : '');
      toggle.textContent = '▶';
      toggle.addEventListener('click', e => { e.stopPropagation(); toggleNode(lineage); });

      const icon = document.createElement('span');
      icon.className = 'tree-icon ' + (isRoot ? 'root' : hasChildren ? 'branch' : 'leaf');
      icon.textContent = isRoot ? '◈' : hasChildren ? '◇' : '○';

      const label = document.createElement('span');
      label.className = 'tree-label';
      label.textContent = obj.name;

      content.appendChild(toggle);
      content.appendChild(icon);
      content.appendChild(label);

      // Tags dots
      if (obj.tags && obj.tags.length > 0) {
        const tagsDiv = document.createElement('span');
        tagsDiv.className = 'tree-tags';
        obj.tags.slice(0, 3).forEach(t => {
          const dot = document.createElement('span');
          dot.className = 'tree-tag-dot' + (store.tags[t]?.isCategory ? ' category' : '');
          dot.title = t;
          tagsDiv.appendChild(dot);
        });
        content.appendChild(tagsDiv);
      }

      // Tag button (visible on hover)
      const tagBtn = document.createElement('button');
      tagBtn.className = 'tree-tag-btn';
      tagBtn.textContent = '+';
      tagBtn.title = 'Gérer les tags';
      tagBtn.addEventListener('click', e => showTagPicker(e, lineage));
      content.appendChild(tagBtn);

      if (hasChildren) {
        const badge = document.createElement('span');
        badge.className = 'tree-badge';
        badge.textContent = entry.children.length;
        content.appendChild(badge);
      }

      content.addEventListener('click', () => selectNode(lineage));
      node.appendChild(content);

      if (hasChildren && isExpanded) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'tree-children';
        entry.children.forEach(child => {
          const cn = renderTreeNode(child);
          if (cn) childrenContainer.appendChild(cn);
        });
        node.appendChild(childrenContainer);
      }

      return node;
    }

    function toggleNode(lineage) {
      if (store.expandedNodes.has(lineage)) store.expandedNodes.delete(lineage);
      else store.expandedNodes.add(lineage);
      renderTree();
    }

    function expandAll() {
      Object.keys(store.lineageIndex.index).forEach(l => store.expandedNodes.add(l));
      renderTree();
    }

    function collapseAll() {
      store.expandedNodes.clear();
      renderTree();
    }

    function selectNode(lineage) {
      store.selectedLineage = lineage;
      getAncestors(lineage).forEach(a => store.expandedNodes.add(a));
      renderTree();
      renderFractal();
      updateBreadcrumb();
    }

    // =============================================================================
    // DRAG & DROP
    // =============================================================================
    
    let dragData = { type: null, value: null };

    function handleDragStart(e, value, type) {
      dragData = { type, value };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', value);
      e.target.classList.add('dragging');
    }

    function handleDragEnd(e) {
      dragData = { type: null, value: null };
      e.target.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function handleDragOver(e, content) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      content.classList.add('drag-over');
    }

    function handleDragLeave(e, content) {
      content.classList.remove('drag-over');
    }

    function handleDrop(e, targetLineage, content) {
      e.preventDefault();
      content.classList.remove('drag-over');

      if (dragData.type === 'tag') {
        addTagToObjectType(targetLineage, dragData.value);
      } else if (dragData.type === 'node') {
        if (dragData.value === targetLineage) return;
        if (targetLineage.startsWith(dragData.value + ':')) {
          showToast('Impossible de déplacer sous un descendant', 'error');
          return;
        }
        if (reparentObjectType(dragData.value, targetLineage)) {
          renderTree();
          renderFractal();
        }
      }
    }

    // =============================================================================
    // TAGS PANEL RENDERING
    // =============================================================================
    
    function renderTags() {
      const container = document.getElementById('tagsContainer');
      const sorted = Object.values(store.tags).sort((a, b) => a.name.localeCompare(b.name));
      
      container.innerHTML = sorted.map(tag => {
        const count = getTagUsageCount(tag.name);
        const parentInfo = tag.parentCategory ? `<div class="sidebar-tag-parent">↳ ${tag.parentCategory}</div>` : '';
        return `
          <div class="sidebar-tag ${tag.isCategory ? 'category' : ''}" draggable="true" data-tag="${tag.name}" oncontextmenu="showTagContextMenu(event, '${tag.name}')">
            <span class="sidebar-tag-icon">${tag.isCategory ? '▣' : '○'}</span>
            <span class="sidebar-tag-name">${tag.name}</span>
            <span class="sidebar-tag-count">${count}</span>
          </div>
          ${parentInfo}
        `;
      }).join('');

      // Add drag listeners
      container.querySelectorAll('.sidebar-tag').forEach(el => {
        el.addEventListener('dragstart', e => handleDragStart(e, el.dataset.tag, 'tag'));
        el.addEventListener('dragend', handleDragEnd);
      });
    }

    // =============================================================================
    // CONTEXT MENU
    // =============================================================================
    
    let contextMenuTag = null;

    function showTagContextMenu(e, tagName) {
      e.preventDefault();
      contextMenuTag = tagName;
      const menu = document.getElementById('contextMenu');
      const tag = store.tags[tagName];
      
      // Update toggle item
      const toggleItem = document.getElementById('toggleCategory');
      toggleItem.className = 'context-menu-item ' + (tag.isCategory ? 'checked' : 'unchecked');
      toggleItem.textContent = 'Catégorie';
      
      // Update parent list
      const parentList = document.getElementById('parentCategoryList');
      const categories = Object.values(store.tags).filter(t => t.isCategory && t.name !== tagName);
      parentList.innerHTML = `
        <div class="context-menu-item sub ${!tag.parentCategory ? 'selected' : ''}" onclick="setTagParentCategory('${tagName}', null); hideContextMenu();">
          (aucun)
        </div>
        ${categories.map(c => `
          <div class="context-menu-item sub ${tag.parentCategory === c.name ? 'selected' : ''}" onclick="setTagParentCategory('${tagName}', '${c.name}'); hideContextMenu();">
            ${c.name}
          </div>
        `).join('')}
      `;
      
      menu.style.left = e.pageX + 'px';
      menu.style.top = e.pageY + 'px';
      menu.classList.add('visible');
    }

    function hideContextMenu() {
      document.getElementById('contextMenu').classList.remove('visible');
      contextMenuTag = null;
    }

    document.getElementById('toggleCategory').addEventListener('click', () => {
      if (contextMenuTag) toggleTagCategory(contextMenuTag);
      hideContextMenu();
    });

    document.getElementById('deleteTag').addEventListener('click', () => {
      if (contextMenuTag) deleteTag(contextMenuTag);
      hideContextMenu();
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.context-menu')) hideContextMenu();
      if (!e.target.closest('.tag-picker') && !e.target.closest('.tree-tag-btn')) hideTagPicker();
    });

    // =============================================================================
    // FRACTAL RENDERING
    // =============================================================================
    
    function renderFractal() {
      const container = document.getElementById('fractalContent');
      const title = document.getElementById('fractalTitle');

      if (!store.selectedLineage) {
        title.textContent = 'Sélectionner un ObjectType';
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◇</div><div class="empty-state-text">Sélectionnez un ObjectType dans l\'arbre.</div></div>';
        return;
      }

      const fractal = computeXFractal(store.selectedLineage, store.maxDepth);
      if (!fractal) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">ObjectType non trouvé</div></div>';
        return;
      }

      title.textContent = fractal.lineage;
      const currentObj = getObjectTypeByLineage(store.selectedLineage);
      const aliases = getAliasesForLineage(store.selectedLineage);
      const catalogInstances = getCatalogInstances(store.selectedLineage);

      let html = '<div class="lineage-chain">';
      fractal.chain.forEach(step => {
        const stepClass = step.isCurrent ? 'current' : (step.toFinalize ? 'to-finalize' : '');
        const isOwned = step.isCurrent;
        html += `
          <div class="lineage-step ${stepClass}">
            <div class="lineage-connector"><div class="lineage-dot"></div><div class="lineage-line"></div></div>
            <div class="lineage-card" data-lineage="${step.lineage}">
              <div class="lineage-card-header">
                <span class="lineage-card-name">${step.name}</span>
                <span class="lineage-card-lineage">${step.lineage}</span>
              </div>
              <div class="lineage-card-elements">
                ${renderElementGroup('Attrs', step.elements.attributes, step.lineage, 'AttributeList', isOwned)}
                ${renderElementForm(step.lineage, 'AttributeList')}
                ${renderElementGroup('Methods', step.elements.methods, step.lineage, 'MethodList', isOwned)}
                ${renderElementForm(step.lineage, 'MethodList')}
                ${step.elements.relations.length ? renderRelationGroup(step.elements.relations, step.lineage, isOwned) : ''}
                ${renderElementForm(step.lineage, 'RelationList')}
                ${step.elements.rules.length ? renderRuleGroup(step.elements.rules, step.lineage, isOwned) : ''}
                ${renderElementForm(step.lineage, 'RuleList')}
                ${isOwned ? renderAddButtons(step.lineage) : ''}
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';

      // Tags section
      html += `
        <div class="section-divider"></div>
        <div class="section-title">Tags</div>
        <div class="tags-display" id="objectTags">
          ${(currentObj.tags || []).map(t => {
            const tag = store.tags[t];
            return `<span class="tag-pill ${tag?.isCategory ? 'category' : ''}">${t}<span class="remove-tag" onclick="removeTagFromObjectType('${store.selectedLineage}', '${t}')">×</span></span>`;
          }).join('')}
          ${currentObj.tags?.length === 0 ? '<span style="color: var(--text-muted); font-size: 12px;">Glissez un tag depuis la sidebar</span>' : ''}
        </div>
      `;

      // Alias section
      html += `
        <div class="section-divider"></div>
        <div class="section-title alias">Alias</div>
        <div class="alias-list">
          ${aliases.map(a => `
            <div class="alias-item">
              <span class="alias-name">${a.name}</span>
              <span class="alias-arrow">→</span>
              <span class="alias-target">${a.target}</span>
              <span class="alias-remove" onclick="deleteAlias('${a.name}')">×</span>
            </div>
          `).join('')}
          ${aliases.length === 0 ? '<div style="color: var(--text-muted); font-size: 12px; padding: 8px;">Aucun alias</div>' : ''}
        </div>
        <div class="add-alias-form">
          <input type="text" class="add-alias-input" id="newAliasInput" placeholder="Nouvel alias...">
          <button class="add-alias-btn" onclick="createAliasFromInput()">Ajouter</button>
        </div>
      `;

      // Catalog section
      html += `
        <div class="section-divider catalog-section"></div>
        <div class="section-title" style="--before-bg: var(--accent-injected);">Catalogue (Instances)</div>
        <button class="instantiate-btn" onclick="createCatalogInstance('${store.selectedLineage}')">+ Instancier pour le catalogue</button>
        ${catalogInstances.length > 0 ? `
          <div class="catalog-instances">
            ${catalogInstances.map(inst => `
              <div class="catalog-item">
                <div class="catalog-item-info">
                  <span class="catalog-item-id">${inst.id}</span>
                  <span class="catalog-item-date">${new Date(inst.createdAt).toLocaleString('fr-FR')}</span>
                </div>
                <span class="catalog-item-delete" onclick="deleteCatalogInstance('${inst.id}')">×</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;

      if (fractal.depthLimited) {
        html += `
          <div style="margin-top: 16px; padding: 12px; background: var(--bg-tertiary); border: 1px dashed var(--border-medium); border-radius: 6px; display: flex; align-items: center; gap: 12px;">
            <span style="color: var(--text-muted);">⋯</span>
            <span style="font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary);">Vue limitée à ${store.maxDepth} niveaux</span>
            <button onclick="increaseDepth()" style="margin-left: auto; padding: 6px 12px; background: var(--bg-hover); border: 1px solid var(--border-medium); border-radius: 4px; color: var(--text-primary); cursor: pointer; font-family: var(--font-mono); font-size: 11px;">Voir plus</button>
          </div>
        `;
      }

      container.innerHTML = html;

      // Attach drag&drop listeners to lineage-cards
      container.querySelectorAll('.lineage-card[data-lineage]').forEach(card => {
        const lineage = card.dataset.lineage;
        card.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', e => {
          card.classList.remove('drag-over');
        });
        card.addEventListener('drop', e => {
          e.preventDefault();
          card.classList.remove('drag-over');
          if (dragData.type === 'tag') {
            addTagToObjectType(lineage, dragData.value);
          }
        });
      });
    }

    function createAliasFromInput() {
      const input = document.getElementById('newAliasInput');
      const name = input.value.trim();
      if (name && store.selectedLineage) {
        createAlias(name, store.selectedLineage);
        input.value = '';
      }
    }

    function renderElementGroup(label, elements, lineage, listType, isOwned = false) {
      const editableTags = elements.map(el => {
        const name = el.name || el.signature?.split('(')[0] || 'unnamed';
        const fromInfo = el.from ? `<span class="element-tag-source">← ${el.from}</span>` : '';
        const canEdit = el.source === 'owned' && isOwned;
        const editIcon = canEdit ? `<span class="edit-icon">✎</span>` : '';
        const deleteBtn = canEdit ? `<span class="delete-btn" onclick="event.stopPropagation(); handleDeleteElement('${lineage}', '${listType}', '${el.name}')">×</span>` : '';
        const clickHandler = canEdit ? `onclick="handleEditElement('${lineage}', '${listType}', '${el.name}')"` : '';
        return `<span class="element-tag ${el.source} ${canEdit ? 'editable' : ''}" ${clickHandler}>${name}${fromInfo}${editIcon}${deleteBtn}</span>`;
      }).join('');
      
      return `<div class="element-group"><span class="element-group-label">${label}</span>${editableTags}</div>`;
    }

    function renderRelationGroup(relations, lineage, isOwned = false) {
      const tags = relations.map(rel => {
        const canEdit = isOwned;
        const deleteBtn = canEdit ? `<span class="delete-btn" onclick="event.stopPropagation(); handleDeleteRelation('${lineage}', '${rel.type}', '${rel.target}')">×</span>` : '';
        return `<span class="element-tag owned">${rel.type} → ${rel.target}${deleteBtn}</span>`;
      }).join('');
      return `<div class="element-group"><span class="element-group-label">Rels</span>${tags}</div>`;
    }

    function renderRuleGroup(rules, lineage, isOwned = false) {
      const tags = rules.map(rule => {
        const canEdit = isOwned;
        const deleteBtn = canEdit ? `<span class="delete-btn" onclick="event.stopPropagation(); handleDeleteRule('${lineage}', '${rule.id}')">×</span>` : '';
        return `<span class="element-tag owned">${rule.action}: ${rule.target}${deleteBtn}</span>`;
      }).join('');
      return `<div class="element-group"><span class="element-group-label">Rules</span>${tags}</div>`;
    }

    // Element editing handlers
    function handleEditElement(lineage, listType, elementName) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      const element = obj.elementList[listType].owned_bundle.find(e => e.name === elementName);
      if (!element) return;
      
      store.editingElement = { lineage, listType, element: { ...element }, isNew: false };
      renderFractal();
    }

    function handleDeleteElement(lineage, listType, elementName) {
      if (deleteElement(lineage, listType, elementName)) {
        renderFractal();
        renderTree();
      }
    }

    function handleDeleteRelation(lineage, relType, target) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      const idx = obj.elementList.RelationList.owned_bundle.findIndex(r => r.type === relType && r.target === target);
      if (idx !== -1) {
        obj.elementList.RelationList.owned_bundle.splice(idx, 1);
        showToast('Relation supprimée', 'success');
        renderFractal();
      }
    }

    function handleDeleteRule(lineage, ruleId) {
      const obj = getObjectTypeByLineage(lineage);
      if (!obj) return;
      const idx = obj.elementList.RuleList.owned_bundle.findIndex(r => r.id === ruleId);
      if (idx !== -1) {
        obj.elementList.RuleList.owned_bundle.splice(idx, 1);
        showToast('Règle supprimée', 'success');
        renderFractal();
      }
    }

    function handleAddElement(lineage, listType) {
      const defaults = {
        'AttributeList': { name: '', type: 'string', required: false },
        'MethodList': { name: '', signature: '(): void' },
        'RuleList': { id: 'rule-' + Date.now(), type: 'ERK', condition: '', action: 'enable', target: '' },
        'RelationList': { type: 'depends_on', target: '' }
      };
      store.editingElement = { lineage, listType, element: defaults[listType], isNew: true };
      renderFractal();
    }

    function handleSaveElement() {
      if (!store.editingElement) return;
      const { lineage, listType, element, isNew } = store.editingElement;
      
      if (isNew) {
        if (addElement(lineage, listType, element)) {
          store.editingElement = null;
          renderFractal();
          renderTree();
        }
      } else {
        const oldName = store.editingElement.originalName || element.name;
        if (updateElement(lineage, listType, oldName, element)) {
          store.editingElement = null;
          renderFractal();
          renderTree();
        }
      }
    }

    function handleCancelEdit() {
      store.editingElement = null;
      renderFractal();
    }

    function renderElementForm(lineage, listType) {
      if (!store.editingElement || store.editingElement.lineage !== lineage || store.editingElement.listType !== listType) {
        return '';
      }
      
      const el = store.editingElement.element;
      const isNew = store.editingElement.isNew;
      
      if (listType === 'AttributeList') {
        return `
          <div class="element-form" id="elementForm">
            <div class="element-form-row">
              <span class="element-form-label">Nom</span>
              <input class="element-form-input" type="text" value="${el.name}" onchange="store.editingElement.element.name = this.value" placeholder="attributeName">
            </div>
            <div class="element-form-row">
              <span class="element-form-label">Type</span>
              <select class="element-form-input" onchange="store.editingElement.element.type = this.value">
                <option value="string" ${el.type === 'string' ? 'selected' : ''}>string</option>
                <option value="number" ${el.type === 'number' ? 'selected' : ''}>number</option>
                <option value="float" ${el.type === 'float' ? 'selected' : ''}>float</option>
                <option value="boolean" ${el.type === 'boolean' ? 'selected' : ''}>boolean</option>
                <option value="array" ${el.type === 'array' ? 'selected' : ''}>array</option>
                <option value="object" ${el.type === 'object' ? 'selected' : ''}>object</option>
                <option value="uuid" ${el.type === 'uuid' ? 'selected' : ''}>uuid</option>
                <option value="datetime" ${el.type === 'datetime' ? 'selected' : ''}>datetime</option>
                <option value="enum" ${el.type === 'enum' ? 'selected' : ''}>enum</option>
              </select>
              <label style="display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary);">
                <input type="checkbox" class="element-form-checkbox" ${el.required ? 'checked' : ''} onchange="store.editingElement.element.required = this.checked">
                required
              </label>
            </div>
            <div class="element-form-actions">
              <button class="element-form-btn cancel" onclick="handleCancelEdit()">Annuler</button>
              <button class="element-form-btn save" onclick="handleSaveElement()">${isNew ? 'Ajouter' : 'Enregistrer'}</button>
            </div>
          </div>
        `;
      }
      
      if (listType === 'MethodList') {
        return `
          <div class="element-form" id="elementForm">
            <div class="element-form-row">
              <span class="element-form-label">Nom</span>
              <input class="element-form-input" type="text" value="${el.name}" onchange="store.editingElement.element.name = this.value" placeholder="methodName">
            </div>
            <div class="element-form-row">
              <span class="element-form-label">Signature</span>
              <input class="element-form-input" type="text" value="${el.signature || ''}" onchange="store.editingElement.element.signature = this.value" placeholder="(params): ReturnType">
            </div>
            <div class="element-form-actions">
              <button class="element-form-btn cancel" onclick="handleCancelEdit()">Annuler</button>
              <button class="element-form-btn save" onclick="handleSaveElement()">${isNew ? 'Ajouter' : 'Enregistrer'}</button>
            </div>
          </div>
        `;
      }
      
      if (listType === 'RelationList') {
        return `
          <div class="element-form" id="elementForm">
            <div class="element-form-row">
              <span class="element-form-label">Type</span>
              <select class="element-form-input" onchange="store.editingElement.element.type = this.value">
                <option value="depends_on" ${el.type === 'depends_on' ? 'selected' : ''}>depends_on</option>
                <option value="related_to" ${el.type === 'related_to' ? 'selected' : ''}>related_to</option>
              </select>
            </div>
            <div class="element-form-row">
              <span class="element-form-label">Target</span>
              <input class="element-form-input" type="text" value="${el.target || ''}" onchange="store.editingElement.element.target = this.value" placeholder="Target:Lineage">
            </div>
            <div class="element-form-actions">
              <button class="element-form-btn cancel" onclick="handleCancelEdit()">Annuler</button>
              <button class="element-form-btn save" onclick="handleSaveElement()">${isNew ? 'Ajouter' : 'Enregistrer'}</button>
            </div>
          </div>
        `;
      }
      
      if (listType === 'RuleList') {
        return `
          <div class="element-form" id="elementForm">
            <div class="element-form-row">
              <span class="element-form-label">Condition</span>
              <input class="element-form-input" type="text" value="${el.condition || ''}" onchange="store.editingElement.element.condition = this.value" placeholder="this.attr != null">
            </div>
            <div class="element-form-row">
              <span class="element-form-label">Action</span>
              <select class="element-form-input small" onchange="store.editingElement.element.action = this.value">
                <option value="enable" ${el.action === 'enable' ? 'selected' : ''}>enable</option>
                <option value="require" ${el.action === 'require' ? 'selected' : ''}>require</option>
                <option value="kill" ${el.action === 'kill' ? 'selected' : ''}>kill</option>
              </select>
              <span class="element-form-label" style="width: auto; margin-left: 8px;">Target</span>
              <input class="element-form-input" type="text" value="${el.target || ''}" onchange="store.editingElement.element.target = this.value" placeholder="this.method">
            </div>
            <div class="element-form-actions">
              <button class="element-form-btn cancel" onclick="handleCancelEdit()">Annuler</button>
              <button class="element-form-btn save" onclick="handleSaveElement()">${isNew ? 'Ajouter' : 'Enregistrer'}</button>
            </div>
          </div>
        `;
      }
      
      return '';
    }

    function renderAddButtons(lineage) {
      return `
        <div class="element-actions">
          <button class="add-element-btn" onclick="handleAddElement('${lineage}', 'AttributeList')">+ Attribut</button>
          <button class="add-element-btn" onclick="handleAddElement('${lineage}', 'MethodList')">+ Méthode</button>
          <button class="add-element-btn" onclick="handleAddElement('${lineage}', 'RelationList')">+ Relation</button>
          <button class="add-element-btn" onclick="handleAddElement('${lineage}', 'RuleList')">+ Règle</button>
        </div>
      `;
    }

    function increaseDepth() {
      store.maxDepth = Math.min(store.maxDepth + 3, 20);
      document.getElementById('depthSlider').value = store.maxDepth;
      document.getElementById('depthValue').textContent = store.maxDepth;
      renderFractal();
    }

    // =============================================================================
    // BREADCRUMB & INPUT
    // =============================================================================
    
    function updateBreadcrumb() {
      const container = document.getElementById('breadcrumb');
      container.innerHTML = store.lineageIndex.roots.map(root => {
        const isActive = store.selectedLineage && (store.selectedLineage === root || store.selectedLineage.startsWith(root + ':'));
        return `<span class="breadcrumb-item ${isActive ? 'active' : ''}" onclick="selectNode('${root}')">${root}</span>`;
      }).join('');
    }

    function setupLineageInput() {
      const input = document.getElementById('lineageInput');
      input.addEventListener('input', e => {
        const value = e.target.value.trim();
        input.classList.toggle('invalid', value && !validateLineage(value));
      });
      input.addEventListener('keydown', async e => {
        if (e.key === 'Enter') {
          const value = input.value.trim();
          if (!value) return;
          if (!validateLineage(value)) { showToast('Lineage invalide', 'error'); return; }
          const created = await createLineageWithAncestors(value);
          if (created !== null) {
            renderTree();
            // Select the final lineage
            const finalLineage = value.split(':').reduce((acc, seg) => {
              const match = findObjectTypesByName(seg).find(o => !acc || o.lineage.startsWith(acc + ':') || o.lineage === seg);
              return match ? match.lineage : (acc ? acc + ':' + seg : seg);
            }, '');
            const obj = getObjectTypeByLineage(finalLineage) || getObjectTypeByLineage(value);
            if (obj) selectNode(obj.lineage);
            input.value = '';
            if (created.length > 0) showToast(`${created.length} ObjectType(s) créé(s)`, 'warning');
          }
        }
      });
    }

    function setupDepthControl() {
      const slider = document.getElementById('depthSlider');
      const value = document.getElementById('depthValue');
      slider.addEventListener('input', e => {
        store.maxDepth = parseInt(e.target.value);
        value.textContent = store.maxDepth;
        renderFractal();
      });
    }

    // Tag create input
    document.getElementById('tagCreateInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') createTag();
    });

    // =============================================================================
    // TOAST
    // =============================================================================
    
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      toast.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // =============================================================================
    // INIT
    // =============================================================================
    
    function initialize() {
      store.objectTypes = INITIAL_DATA.objectTypes;
      store.tags = INITIAL_DATA.tags;
      store.aliases = INITIAL_DATA.aliases;
      buildLineageIndex();
      store.lineageIndex.roots.forEach(root => store.expandedNodes.add(root));
      setupLineageInput();
      setupDepthControl();
      renderTree();
      renderTags();
      updateBreadcrumb();
      console.log('Object Fractal Tool v2 initialized', store);
    }

    window.OFT = { store, validateLineage, createTag, deleteTag, createAlias, deleteAlias, addTagToObjectType, removeTagFromObjectType, selectNode, renderTree, renderTags, renderFractal };
    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
