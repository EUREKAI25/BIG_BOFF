<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EUREKAI Cockpit v47 — Modular</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Minimal loading styles */
    body {
      margin: 0;
      padding: 0;
      background: #0f0f23;
      color: #e6e6e6;
      font-family: -apple-system, sans-serif;
    }
    
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    
    .loading-logo {
      font-size: 24px;
      font-weight: 600;
      color: #2ed573;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #2ed573;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: #888;
      font-size: 14px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #app {
      display: none;
    }
    
    #app.loaded {
      display: block;
    }
    
    #app.loaded + #app-loading {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Application container -->
  <div id="app"></div>
  
  <!-- Loading screen -->
  <div id="app-loading">
    <div class="loading-logo">◈ EUREKAI</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Chargement des modules...</div>
  </div>
  
  <!-- Core: Event Bus (must be first) -->
  <script src="core/eventBus.js"></script>
  
  <!-- Core: Module Loader -->
  <script src="core/moduleLoader.js"></script>
  
  <!-- Bootstrap -->
  <script>
    (async function bootstrap() {
      try {
        console.log('[Bootstrap] Starting EUREKAI Cockpit...');
        
        // Charger le manifest et initialiser
        await ModuleLoader.init('manifests/cockpit.manifest.json');
        
        // Marquer l'app comme chargée
        document.getElementById('app').classList.add('loaded');
        
        console.log('[Bootstrap] EUREKAI Cockpit ready!');
        
      } catch (error) {
        console.error('[Bootstrap] Failed to initialize:', error);
        
        document.getElementById('app-loading').innerHTML = `
          <div class="loading-logo" style="color: #ff6b6b;">◈ EUREKAI</div>
          <div style="color: #ff6b6b;">Erreur de chargement</div>
          <div class="loading-text">${error.message}</div>
          <button onclick="location.reload()" style="padding: 10px 20px; background: #2ed573; border: none; border-radius: 6px; color: #0f0f23; cursor: pointer; margin-top: 20px;">
            Réessayer
          </button>
        `;
      }
    })();
  </script>
</body>
</html>
