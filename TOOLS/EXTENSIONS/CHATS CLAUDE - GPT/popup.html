<!DOCTYPE html>
<html lang="FR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal AI Conversation Saver</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 5px;
    }
    
    .subtitle {
      font-size: 12px;
      color: #718096;
    }
    
    .platform-indicator {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 500;
      margin-top: 5px;
    }
    
    .claude {
      background: #f0f4ff;
      color: #3182ce;
    }
    
    .chatgpt {
      background: #f0fff4;
      color: #38a169;
    }
    
    .unknown {
      background: #fed7d7;
      color: #e53e3e;
    }
    
    .form-section {
      margin-bottom: 20px;
    }
    
    .form-section label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 6px;
    }
    
    .form-section input, .form-section select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }
    
    .form-section input:focus, .form-section select:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 0 2px rgba(49, 130, 206, 0.1);
    }
    
    .url-section {
      background: #f8fafc;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .primary {
      background: #3182ce;
      color: white;
    }
    
    .primary:hover {
      background: #2c5aa0;
    }
    
    .secondary {
      background: #e2e8f0;
      color: #4a5568;
    }
    
    .secondary:hover {
      background: #cbd5e0;
    }
    
    .success {
      background: #38a169;
      color: white;
    }
    
    .error {
      background: #e53e3e;
      color: white;
    }
    
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      text-align: center;
    }
    
    .hidden {
      display: none;
    }
    
    .info {
      background: #bee3f8;
      color: #2a69ac;
      margin-bottom: 15px;
      padding: 8px;
      border-radius: 4px;
      font-size: 10px;
      text-align: center;
    }
    
    .preview {
      margin-top: 15px;
      max-height: 150px;
      overflow-y: auto;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px;
    }
    
    .preview h4 {
      margin: 0 0 8px 0;
      font-size: 11px;
      color: #4a5568;
    }
    
    .preview pre {
      margin: 0;
      font-size: 9px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .stats {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 10px;
      color: #718096;
    }
    
    .tab-buttons {
      display: flex;
      margin-bottom: 15px;
    }
    
    .tab-button {
      flex: 1;
      padding: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
    }
    
    .tab-button.active {
      background: #3182ce;
      color: white;
      border-color: #3182ce;
    }
    
    .tab-button:first-child {
      border-radius: 6px 0 0 6px;
    }
    
    .tab-button:last-child {
      border-radius: 0 6px 6px 0;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .directory-select {
      position: relative;
    }
    
    .recent-urls {
      max-height: 80px;
      overflow-y: auto;
      margin-top: 8px;
    }
    
    .recent-url {
      padding: 4px 8px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.2s;
    }
    
    .recent-url:hover {
      background: #edf2f7;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🤖 AI Conversation Saver</div>
    <div class="subtitle">Claude & ChatGPT</div>
    <div id="platformIndicator" class="platform-indicator unknown">
      Détection en cours...
    </div>
  </div>
  
  <div class="info">
    💾 Extraction page courante ou URL personnalisée
  </div>
  
  <!-- Onglets -->
  <div class="tab-buttons">
    <div class="tab-button active" data-tab="current">Page courante</div>
    <div class="tab-button" data-tab="custom">URL personnalisée</div>
  </div>
  
  <!-- Contenu page courante -->
  <div class="tab-content active" id="current-tab">
    <div class="form-section">
      <label for="filename">Nom du fichier :</label>
      <input type="text" id="filename" placeholder="conversation-2025-07-07" />
    </div>
    
    <button id="extractBtn" class="button primary">
      📋 Prévisualiser la conversation
    </button>
    
    <button id="downloadBtn" class="button secondary">
      💾 Télécharger en JSON
    </button>
    
    <button id="copyBtn" class="button secondary">
      📄 Copier dans le presse-papiers
    </button>
    
    <div style="font-size: 9px; color: #718096; margin-top: 8px; text-align: center;">
      💡 Le téléchargement ouvrira une boîte de dialogue pour choisir le répertoire
    </div>
  </div>
  
  <!-- Contenu URL personnalisée -->
  <div class="tab-content" id="custom-tab">
    <div class="url-section">
      <label for="customUrl">URL de la conversation :</label>
      <input type="text" id="customUrl" placeholder="https://claude.ai/chat/... ou https://chatgpt.com/c/..." />
      
      <div class="recent-urls" id="recentUrls">
        <!-- Les URLs récentes seront ajoutées ici -->
      </div>
    </div>
    
    <div class="form-section">
      <label for="outputDirectory">Répertoire de destination :</label>
      <select id="outputDirectory">
        <option value="/Users/nathalie/Dropbox/CHATS">📁 CHATS (Dropbox)</option>
        <option value="/Users/nathalie/Downloads">📥 Téléchargements</option>
        <option value="/Users/nathalie/Documents">📄 Documents</option>
        <option value="custom">📂 Autre répertoire...</option>
      </select>
      
      <input type="text" id="customDirectory" class="hidden" placeholder="/chemin/vers/dossier" />
    </div>
    
    <button id="extractCustomBtn" class="button primary">
      🌐 Extraire conversation distante
    </button>
  </div>
  
  <div id="status" class="status hidden"></div>
  
  <div id="stats" class="stats hidden">
    <span id="messageCount">0 messages</span>
    <span id="platform">Plateforme inconnue</span>
  </div>
  
  <div id="preview" class="preview hidden">
    <h4>Aperçu de la conversation :</h4>
    <pre id="previewContent"></pre>
  </div>

  <script src="popup.js"></script>
</body>
</html>
